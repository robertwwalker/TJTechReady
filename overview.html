<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tim Johnson Spec'd Basics of Workplace Readiness</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2229;
    --border: #2a2f3a;
    --accent: #f0c040;
    --accent2: #4df0a0;
    --accent3: #f04d7a;
    --text: #e8eaf0;
    --muted: #7a8090;
    --correct: #4df0a0;
    --wrong: #f04d7a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BACKGROUND */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(240,192,64,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,192,64,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(13,15,20,0.9);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.2rem;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .progress-bar-container {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .progress-track {
    width: 200px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* MAIN LAYOUT */
  .main {
    max-width: 960px;
    margin: 0 auto;
    padding: 60px 40px;
  }

  /* HOME SCREEN */
  .home-screen { animation: fadeIn 0.5s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: 1px solid rgba(240,192,64,0.3);
    padding: 4px 12px;
    border-radius: 20px;
    display: inline-block;
    margin-bottom: 24px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2.5rem, 6vw, 4rem);
    line-height: 1.05;
    letter-spacing: -0.03em;
    margin-bottom: 20px;
  }

  h1 span { color: var(--accent); }

  .hero-sub {
    font-size: 1.1rem;
    color: var(--muted);
    max-width: 520px;
    line-height: 1.7;
    margin-bottom: 48px;
  }

  .modules-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .module-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .module-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--card-color, var(--accent));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }

  .module-card:hover {
    border-color: var(--card-color, var(--accent));
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  }

  .module-card:hover::before { transform: scaleX(1); }

  .module-card.completed { opacity: 0.7; }
  .module-card.completed .module-badge { background: var(--correct); color: #000; }

  .module-icon {
    font-size: 2.2rem;
    margin-bottom: 16px;
    display: block;
  }

  .module-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    margin-bottom: 8px;
  }

  .module-desc {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .module-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .module-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--surface2);
    color: var(--muted);
  }

  .module-arrow {
    color: var(--card-color, var(--accent));
    font-size: 1.2rem;
  }

  /* LESSON SCREEN */
  .lesson-screen { animation: fadeIn 0.4s ease; }

  .lesson-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 40px;
  }

  .back-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    transition: all 0.2s;
  }

  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  .lesson-breadcrumb {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }

  /* CONTENT SECTIONS */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px;
    margin-bottom: 24px;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .section h2 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.6rem;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
  }

  .section p {
    color: #b0b8c8;
    line-height: 1.8;
    margin-bottom: 16px;
    font-size: 0.95rem;
  }

  /* VISUAL DIAGRAM */
  .diagram {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin: 24px 0;
  }

  /* HW vs SW VISUAL */
  .hw-sw-visual {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .hw-side, .sw-side {
    border-radius: 10px;
    padding: 20px;
    text-align: center;
  }

  .hw-side {
    background: rgba(240,192,64,0.08);
    border: 1px solid rgba(240,192,64,0.2);
  }

  .sw-side {
    background: rgba(77,240,160,0.08);
    border: 1px solid rgba(77,240,160,0.2);
  }

  .hw-side .side-title { color: var(--accent); }
  .sw-side .side-title { color: var(--accent2); }

  .side-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 14px;
  }

  .item-list { list-style: none; }
  .item-list li {
    font-size: 0.85rem;
    color: var(--muted);
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .item-list li:last-child { border-bottom: none; }
  .item-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* FILE PATH VISUAL */
  .path-visual {
    display: flex;
    align-items: center;
    gap: 0;
    flex-wrap: wrap;
    padding: 16px;
    background: #0a0c10;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    margin: 16px 0;
  }

  .path-segment {
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .path-segment:hover { background: var(--surface2); }
  .path-sep { color: var(--muted); padding: 0 2px; }

  .path-tooltip {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 0.75rem;
    color: var(--text);
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    z-index: 10;
  }

  .path-segment:hover .path-tooltip { opacity: 1; }

  /* OS COMPARISON */
  .os-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .os-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    text-align: center;
    transition: all 0.2s;
  }

  .os-card:hover { border-color: var(--accent); }
  .os-icon { font-size: 2rem; margin-bottom: 8px; }
  .os-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    margin-bottom: 6px;
  }
  .os-desc { font-size: 0.75rem; color: var(--muted); line-height: 1.5; }

  /* QUIZ SECTION */
  .quiz-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px;
    margin-top: 32px;
  }

  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .quiz-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.3rem;
  }

  .quiz-counter {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .question-text {
    font-size: 1.05rem;
    font-weight: 500;
    margin-bottom: 24px;
    line-height: 1.6;
  }

  .answers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }

  .answer-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    line-height: 1.4;
    transition: all 0.2s;
  }

  .answer-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(240,192,64,0.07);
  }

  .answer-btn.correct {
    border-color: var(--correct);
    background: rgba(77,240,160,0.1);
    color: var(--correct);
  }

  .answer-btn.wrong {
    border-color: var(--wrong);
    background: rgba(240,77,122,0.1);
    color: var(--wrong);
  }

  .answer-btn:disabled { cursor: not-allowed; }

  .feedback-box {
    padding: 16px 20px;
    border-radius: 10px;
    font-size: 0.9rem;
    line-height: 1.6;
    margin-bottom: 20px;
    display: none;
  }

  .feedback-box.correct {
    background: rgba(77,240,160,0.1);
    border: 1px solid rgba(77,240,160,0.3);
    color: var(--correct);
    display: block;
  }

  .feedback-box.wrong {
    background: rgba(240,77,122,0.1);
    border: 1px solid rgba(240,77,122,0.3);
    color: #f08090;
    display: block;
  }

  .next-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 12px 28px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }

  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(240,192,64,0.3); }
  .next-btn.visible { display: inline-block; }

  /* SCORE SCREEN */
  .score-screen {
    text-align: center;
    padding: 60px 40px;
    animation: fadeIn 0.5s ease;
  }

  .score-circle {
    width: 140px; height: 140px;
    border-radius: 50%;
    border: 4px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 32px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2.5rem;
    color: var(--accent);
    position: relative;
  }

  .score-circle::after {
    content: '';
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 1px solid rgba(240,192,64,0.2);
  }

  .score-msg {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.8rem;
    margin-bottom: 12px;
  }

  .score-sub { color: var(--muted); margin-bottom: 36px; }

  .score-actions { display: flex; gap: 12px; justify-content: center; }

  .btn-primary {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 12px 28px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(240,192,64,0.3); }

  .btn-ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    padding: 12px 28px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-ghost:hover { border-color: var(--text); }

  /* DRAG DROP */
  .drag-zone {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin: 20px 0;
  }

  .drag-items {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .drag-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    cursor: grab;
    font-size: 0.88rem;
    transition: all 0.2s;
    user-select: none;
  }

  .drag-item:hover { border-color: var(--accent); }
  .drag-item.dragging { opacity: 0.4; }

  .drop-targets { display: flex; flex-direction: column; gap: 12px; }

  .drop-target {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    min-height: 48px;
    transition: all 0.2s;
  }

  .drop-target.drag-over { border-color: var(--accent); background: rgba(240,192,64,0.05); }
  .drop-target.filled { border-style: solid; border-color: var(--correct); }
  .drop-target.wrong-drop { border-color: var(--wrong); }

  .drop-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .dropped-item {
    font-size: 0.88rem;
    color: var(--correct);
    padding: 4px 0;
  }

  /* CLICKABLE DIAGRAM */
  .click-diagram {
    position: relative;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin: 16px 0;
  }

  .computer-outline {
    display: flex;
    gap: 20px;
    align-items: stretch;
    justify-content: center;
  }

  .comp-box {
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.25s;
    text-align: center;
    flex: 1;
    max-width: 140px;
    position: relative;
  }

  .comp-box:hover { border-color: var(--accent); background: rgba(240,192,64,0.05); }
  .comp-box.selected { border-color: var(--accent); background: rgba(240,192,64,0.08); }

  .comp-box-icon { font-size: 1.8rem; margin-bottom: 8px; }
  .comp-box-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
  }

  .comp-info-panel {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 20px;
    margin-top: 16px;
    display: none;
    animation: fadeIn 0.3s ease;
  }

  .comp-info-panel.visible { display: block; }
  .comp-info-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .comp-info-text { font-size: 0.88rem; color: #b0b8c8; line-height: 1.7; }

  /* SCENARIO CHALLENGE */
  .scenario-box {
    background: rgba(240,192,64,0.05);
    border: 1px solid rgba(240,192,64,0.2);
    border-radius: 10px;
    padding: 20px 24px;
    margin: 16px 0;
  }

  .scenario-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 8px;
  }

  .scenario-text {
    font-size: 0.95rem;
    line-height: 1.7;
    color: var(--text);
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }

  .tab {
    padding: 10px 18px;
    cursor: pointer;
    font-size: 0.85rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-content { display: none; }
  .tab-content.active { display: block; animation: fadeIn 0.3s ease; }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 24px;
    padding: 20px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-val {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.4rem;
    color: var(--accent);
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* COMPLETION BADGE */
  .completion-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(77,240,160,0.1);
    border: 1px solid rgba(77,240,160,0.3);
    color: var(--correct);
    padding: 4px 12px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  @media (max-width: 600px) {
    .main { padding: 30px 20px; }
    header { padding: 16px 20px; }
    .hw-sw-visual { grid-template-columns: 1fr; }
    .os-grid { grid-template-columns: 1fr; }
    .answers-grid { grid-template-columns: 1fr; }
    .drag-zone { grid-template-columns: 1fr; }
    .computer-outline { flex-wrap: wrap; }
  }
</style>
</head>
<body>
<div class="app">

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <span>The Tim Prep</span>
  </div>
  <div class="progress-bar-container">
    <span id="progressText">0 / 4 modules</span>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
  </div>
</header>

<div class="main" id="mainContent">
</div>

</div>

<script>
// ──────────────── DATA ────────────────
const modules = [
  {
    id: 'hw-sw',
    icon: '🖥️',
    title: 'Hardware vs. Software',
    desc: 'Understand the physical components of a computer and the programs that run on them.',
    color: '#f0c040',
    lessons: true,
    quizzes: [
      {
        q: 'Your computer suddenly won\'t turn on. This is most likely a problem with:',
        answers: ['The operating system', 'Hardware (physical component)', 'A software bug', 'Your internet connection'],
        correct: 1,
        explanation: 'If a computer won\'t turn on at all, it\'s a hardware issue — a power supply, battery, or motherboard problem. Software can\'t run if the machine won\'t start.'
      },
      {
        q: 'Which of these is SOFTWARE?',
        answers: ['The keyboard', 'Microsoft Word', 'The RAM chip', 'The monitor'],
        correct: 1,
        explanation: 'Microsoft Word is software — a program you install and run. The others are physical hardware components you can touch.'
      },
      {
        q: 'RAM (Random Access Memory) is used for:',

let state = {
  screen: 'home', // 'home' | 'lesson' | 'quiz' | 'score'
  currentModule: null,
  currentQ: 0,
  score: 0,
  answered: false,
  completed: JSON.parse(localStorage.getItem('techready_completed') || '[]'),
  selectedPart: null,
};

function saveCompleted() {
  localStorage.setItem('techready_completed', JSON.stringify(state.completed));
}

// ──────────────── RENDER ────────────────
function render() {
  const container = document.getElementById('mainContent');
  const fill = document.getElementById('progressFill');
  const ptext = document.getElementById('progressText');
  const pct = (state.completed.length / modules.length) * 100;
  fill.style.width = pct + '%';
  ptext.textContent = `${state.completed.length} / ${modules.length} modules`;

  if (state.screen === 'home') container.innerHTML = renderHome();
  else if (state.screen === 'lesson') container.innerHTML = renderLesson();
  else if (state.screen === 'quiz') container.innerHTML = renderQuiz();
  else if (state.screen === 'score') container.innerHTML = renderScore();

  attachEvents();
}

// ──────────────── HOME ────────────────
function renderHome() {
  const allDone = state.completed.length === modules.length;
  return `
  <div class="home-screen">
    <div class="hero-tag">Workplace Tech Essentials</div>
    <h1>Tim's <span>tech-ready</span><br>for the world of work.</h1>
    <p class="hero-sub">Four interactive modules covering the computer basics every professional needs to know — hardware, operating systems, files, and the internet.</p>

    ${state.completed.length > 0 ? `

      <div class="stat"><div class="stat-val">${state.completed.length}</div><div class="stat-label">Modules done</div></div>

      ${allDone ? '<div class="stat"><div class="stat-val">🏆</div><div class="stat-label">All done!</div></div>' : ''}

      ${modules.map(m => `
        <div class="module-card ${state.completed.includes(m.id) ? 'completed' : ''}"

          <div class="module-title">${m.title}</div>
          <div class="module-desc">${m.desc}</div>
          <div class="module-meta">

function pct(n) { return (n / modules.length) * 100; }

function renderLesson() {
  const m = state.currentModule;

          <div class="path-tooltip">Protocol: encrypted, secure connection (good!)</div>
        </span>
        <span class="path-sep" style="color:var(--muted)">://</span>
        <span class="path-segment" style="color:#7a8fff">www.company
          <div class="path-tooltip">The domain name — identifies the website/organization.</div>
        </span>
        <span class="path-sep" style="color:var(--muted)">.</span>
        <span class="path-segment" style="color:var(--accent)">com
          <div class="path-tooltip">Top-level domain: .com (commercial), .org (nonprofit), .gov (government)</div>
        </span>
        <span class="path-sep" style="color:var(--muted)">/</span>
        <span class="path-segment" style="color:var(--accent3)">reports/q3
          <div class="path-tooltip">The path: shows which specific page or folder you're viewing.</div>
        </span>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Workplace Scenarios</div>
      <h2>Common situations at work</h2>

      <div style="display:flex;flex-direction:column;gap:12px">
        ${[
          ['❓','The website won\'t load','First check if you have internet at all — try another site. If only one site fails, it may be down for everyone (check downdetector.com). If all sites fail, your Wi-Fi or network connection is the issue.'],
          ['❓','"I can\'t access the shared file"','Check: Are you connected to the company network or VPN? Is the file in cloud storage that requires login? Did someone share it with you properly?'],
          ['❓','"My email won\'t send"','Could be no internet, wrong password/settings, or the email server is down. Test by opening a browser — if websites load, your internet is fine and it\'s an email configuration issue.'],
        ].map(([icon, title, answer]) => `
          <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:20px">
            <div style="font-size:0.9rem;font-weight:600;margin-bottom:8px;color:var(--accent)">${icon} ${title}</div>
            <div style="font-size:0.85rem;color:var(--muted);line-height:1.7">✅ ${answer}</div>
          </div>`).join('')}
      </div>
    </div>`);
}

// ──────────────── QUIZ (inline) ────────────────
function renderQuizInline() {
  const m = state.currentModule;
  const q = m.quizzes[state.currentQ];

  return `
    <div class="section-label">Knowledge Check</div>
    <div class="quiz-header">
      <div class="quiz-title">Quick Quiz</div>
      <div class="quiz-counter">Q${state.currentQ + 1} of ${m.quizzes.length}</div>
    </div>
    <div class="question-text">${q.q}</div>
    <div class="answers-grid">
      ${q.answers.map((a, i) => `
        <button class="answer-btn" data-action="answer" data-index="${i}">${a}</button>
      `).join('')}
    </div>
    <div class="feedback-box" id="feedbackBox"></div>
    <button class="next-btn" id="nextBtn" data-action="nextQuestion">
      ${state.currentQ < m.quizzes.length - 1 ? 'Next Question →' : 'See Results →'}
    </button>`;
}

// ──────────────── SCORE ────────────────
function renderScore() {
  const m = state.currentModule;
  const total = m.quizzes.length;
  const pct = Math.round((state.score / total) * 100);
  const msgs = [
    [100, '🏆 Perfect Score!', 'Outstanding — you nailed every question.'],
    [75, '⭐ Great Work!', 'Solid understanding. Review the missed questions to lock it in.'],
    [50, '📚 Good Start', 'You\'re getting there. Revisit the lesson material and try again.'],
    [0, '🔄 Keep Going', 'Don\'t worry — learning takes time. Re-read the lesson and retry.'],
  ];
  const [, title, sub] = msgs.find(([threshold]) => pct >= threshold);

  return `
  <div class="score-screen">
    <div class="score-circle">${pct}%</div>
    <div class="score-msg">${title}</div>
    <p class="score-sub">${state.score}/${total} correct — ${sub}</p>
    <div class="score-actions">
      <button class="btn-primary" data-action="retryQuiz">Try Again</button>
      <button class="btn-ghost" data-action="goHome">Back to Modules</button>
    </div>
  </div>`;
}

// ──────────────── EVENTS ────────────────
function attachEvents() {
  // Module cards
  document.querySelectorAll('[data-action="openModule"]').forEach(el => {
    el.addEventListener('click', () => {
      const mod = modules.find(m => m.id === el.dataset.id);
      state.currentModule = mod;
      state.currentQ = 0;
      state.score = 0;
      state.answered = false;
      state.selectedPart = null;
      state.screen = 'lesson';
      render();
    });
  });

  // Back button
  document.querySelectorAll('[data-action="goHome"]').forEach(el => {
    el.addEventListener('click', () => {
      state.screen = 'home';
      state.selectedPart = null;
      render();
    });
  });

  // Component explorer
  document.querySelectorAll('[data-action="selectPart"]').forEach(el => {
    el.addEventListener('click', () => {
      const part = el.dataset.part;
      state.selectedPart = part;
      document.querySelectorAll('.comp-box').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
      const panel = document.getElementById('partInfo');
      if (panel) {
        panel.innerHTML = getPartInfo(part);
        panel.classList.add('visible');
      }
    });
  });

  // Tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const target = document.getElementById(tab.dataset.tab);
      if (target) target.classList.add('active');
    });
  });

  // Answers
  document.querySelectorAll('[data-action="answer"]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (state.answered) return;
      state.answered = true;
      const idx = parseInt(btn.dataset.index);
      const q = state.currentModule.quizzes[state.currentQ];
      const correct = idx === q.correct;
      if (correct) state.score++;

      document.querySelectorAll('.answer-btn').forEach((b, i) => {
        b.disabled = true;
        if (i === q.correct) b.classList.add('correct');
        if (i === idx && !correct) b.classList.add('wrong');
      });

      const fb = document.getElementById('feedbackBox');
      if (fb) {
        fb.className = 'feedback-box ' + (correct ? 'correct' : 'wrong');
        fb.innerHTML = (correct ? '✓ Correct! ' : '✗ Not quite. ') + q.explanation;
      }

      const nb = document.getElementById('nextBtn');
      if (nb) nb.classList.add('visible');
    });
  });

  // Next question
  document.querySelectorAll('[data-action="nextQuestion"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const m = state.currentModule;
      if (state.currentQ < m.quizzes.length - 1) {
        state.currentQ++;
        state.answered = false;
        const qs = document.getElementById('quizSection');
        if (qs) { qs.innerHTML = renderQuizInline(); attachEvents(); }
      } else {
        // Mark complete
        if (!state.completed.includes(m.id)) {
          state.completed.push(m.id);
          saveCompleted();
        }
        state.screen = 'score';
        render();
      }
    });
  });

  // Retry
  document.querySelectorAll('[data-action="retryQuiz"]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.currentQ = 0;
      state.score = 0;
      state.answered = false;
      state.screen = 'lesson';
      render();
      // Scroll to quiz
      setTimeout(() => {
        const qs = document.getElementById('quizSection');
        if (qs) qs.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
    });
  });
}

// ──────────────── INIT ────────────────
render();
</script>
</body>
</html>
