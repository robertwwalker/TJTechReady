<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechReady — Diagnostic Pre-Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c12;
    --surface: #13161f;
    --surface2: #1a1e28;
    --border: #252a38;
    --accent: #e0e8ff;
    --accent2: #7090ff;
    --accent3: #50d8c0;
    --warn: #f0c040;
    --text: #dde4f8;
    --muted: #6070a0;
    --correct: #40e890;
    --wrong: #f04868;
    --gap: #f09040;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(112,144,255,0.1) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .app { position: relative; z-index: 1; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 40px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(10,12,18,0.94); backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
  .logo-chip { background: var(--accent2); color: #fff; font-size: 0.65rem; padding: 3px 8px; border-radius: 4px; font-weight: 700; letter-spacing: 0.05em; }
  .header-right { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); }

  .main { max-width: 800px; margin: 0 auto; padding: 60px 40px; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { animation: fadeUp 0.5s ease forwards; }

  /* INTRO SCREEN */
  .intro-screen { text-align: center; padding: 20px 0 60px; }
  .intro-eyebrow { font-family: 'DM Mono', monospace; font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent2); margin-bottom: 20px; }
  .intro-screen h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(2rem,5vw,3rem); line-height: 1.08; letter-spacing: -0.03em; margin-bottom: 20px; }
  .intro-screen h1 em { font-style: normal; color: var(--accent2); }
  .intro-desc { font-size: 0.98rem; color: var(--muted); max-width: 520px; margin: 0 auto 36px; line-height: 1.78; }
  .intro-cards { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; margin-bottom: 40px; text-align: left; }
  .intro-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .intro-card-icon { font-size: 1.5rem; margin-bottom: 8px; }
  .intro-card-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; color: var(--accent3); margin-bottom: 6px; }
  .intro-card-text { font-size: 0.82rem; color: var(--muted); line-height: 1.6; }
  .start-btn { background: var(--accent2); color: #fff; border: none; padding: 14px 36px; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(112,144,255,0.35); }

  /* PROGRESS HEADER */
  .progress-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
  .progress-domain { font-family: 'DM Mono', monospace; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.12em; }
  .progress-counter { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--muted); }
  .progress-dots { display: flex; gap: 5px; margin-top: 10px; }
  .progress-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: background 0.3s; }
  .progress-dot.done { background: var(--correct); }
  .progress-dot.active { background: var(--accent2); }
  .progress-dot.gap { background: var(--gap); }

  /* DOMAIN BANNER */
  .domain-banner { border-radius: 10px; padding: 12px 18px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; font-family: 'DM Mono', monospace; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; }
  .domain-banner.hw { background: rgba(240,192,64,0.08); border: 1px solid rgba(240,192,64,0.2); color: #f0c040; }
  .domain-banner.os { background: rgba(48,216,200,0.08); border: 1px solid rgba(48,216,200,0.2); color: #30d8c8; }
  .domain-banner.files { background: rgba(240,72,128,0.08); border: 1px solid rgba(240,72,128,0.2); color: #f04880; }
  .domain-banner.net { background: rgba(128,96,248,0.08); border: 1px solid rgba(128,96,248,0.2); color: #c080ff; }
  .domain-icon { font-size: 1.2rem; }

  /* QUESTION */
  .q-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 36px; animation: fadeUp 0.35s ease; }
  .q-text { font-size: 1.06rem; font-weight: 500; line-height: 1.65; margin-bottom: 26px; }
  .answers { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; margin-bottom: 22px; }
  .ans-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 13px 16px; color: var(--text); cursor: pointer; text-align: left; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; line-height: 1.45; transition: all 0.2s; }
  .ans-btn:hover:not(:disabled) { border-color: var(--accent2); background: rgba(112,144,255,0.07); }
  .ans-btn.correct { border-color: var(--correct); background: rgba(64,232,144,0.1); color: var(--correct); }
  .ans-btn.wrong { border-color: var(--wrong); background: rgba(240,72,104,0.1); color: var(--wrong); }
  .ans-btn:disabled { cursor: not-allowed; }
  .feedback { padding: 14px 18px; border-radius: 10px; font-size: 0.87rem; line-height: 1.65; margin-bottom: 18px; display: none; }
  .feedback.correct { background: rgba(64,232,144,0.08); border: 1px solid rgba(64,232,144,0.25); color: #70f0a8; display: block; }
  .feedback.wrong { background: rgba(240,72,104,0.08); border: 1px solid rgba(240,72,104,0.25); color: #f09090; display: block; }
  .next-btn { background: var(--accent2); color: #fff; border: none; padding: 11px 26px; border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: all 0.2s; display: none; }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(112,144,255,0.3); }
  .next-btn.show { display: inline-block; }
  .skip-btn { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 11px 22px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; margin-left: 10px; }
  .skip-btn:hover { border-color: var(--muted); color: var(--text); }

  /* RESULTS SCREEN */
  .results-screen { animation: fadeUp 0.5s ease; }
  .results-screen h2 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2rem; letter-spacing: -0.02em; margin-bottom: 8px; }
  .results-sub { color: var(--muted); margin-bottom: 40px; font-size: 0.95rem; line-height: 1.7; }
  .domain-results { display: flex; flex-direction: column; gap: 14px; margin-bottom: 36px; }
  .domain-result { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 22px 26px; display: flex; align-items: center; gap: 20px; }
  .domain-result-icon { font-size: 1.8rem; flex-shrink: 0; }
  .domain-result-info { flex: 1; }
  .domain-result-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; margin-bottom: 6px; }
  .domain-result-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
  .domain-result-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
  .domain-result-score { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); }
  .domain-result-verdict { font-family: 'DM Mono', monospace; font-size: 0.68rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; flex-shrink: 0; }
  .verdict-strong { background: rgba(64,232,144,0.15); color: var(--correct); border: 1px solid rgba(64,232,144,0.3); }
  .verdict-review { background: rgba(240,192,64,0.15); color: var(--warn); border: 1px solid rgba(240,192,64,0.3); }
  .verdict-gap { background: rgba(240,72,128,0.15); color: var(--gap); border: 1px solid rgba(240,72,128,0.3); }

  /* RECOMMENDATIONS */
  .recs-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.15rem; margin-bottom: 14px; color: var(--accent3); }
  .recs-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }
  .rec-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; display: flex; gap: 14px; align-items: flex-start; }
  .rec-priority { font-family: 'DM Mono', monospace; font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em; padding: 3px 9px; border-radius: 4px; flex-shrink: 0; margin-top: 2px; }
  .rec-required { background: rgba(240,72,128,0.15); color: #f08090; border: 1px solid rgba(240,72,128,0.3); }
  .rec-review { background: rgba(240,192,64,0.15); color: var(--warn); border: 1px solid rgba(240,192,64,0.3); }
  .rec-skip { background: rgba(64,232,144,0.12); color: var(--correct); border: 1px solid rgba(64,232,144,0.25); }
  .rec-text { font-size: 0.88rem; line-height: 1.65; color: var(--muted); }
  .rec-text strong { color: var(--text); }

  .results-actions { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn-primary { background: var(--accent2); color: #fff; border: none; padding: 12px 26px; border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(112,144,255,0.3); }
  .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); padding: 12px 26px; border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-ghost:hover { border-color: var(--accent2); }

  /* OVERALL SCORE */
  .overall-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px 28px; display: flex; align-items: center; gap: 24px; margin-bottom: 28px; }
  .overall-ring { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--accent2); display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; color: var(--accent2); flex-shrink: 0; }
  .overall-text-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.1rem; margin-bottom: 4px; }
  .overall-text-sub { font-size: 0.86rem; color: var(--muted); line-height: 1.6; }

  @media(max-width:600px) { .main{padding:28px 18px;} header{padding:14px 18px;} .answers{grid-template-columns:1fr;} .intro-cards{grid-template-columns:1fr;} }

  /* ── AGSM branding ───────────────────────────────────── */
  .nav-logo-img {
    height: 36px; width: 36px;
    object-fit: contain;
    background: #fff;
    border-radius: 6px;
    padding: 3px;
    flex-shrink: 0;
  }
  .nav-divider {
    width: 1px; height: 28px;
    background: var(--border, #2a2f3a);
    flex-shrink: 0;
  }
  .nav-wordmark {
    display: flex; flex-direction: column; gap: 1px;
  }
  .nav-wordmark-top {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted, #7a8090);
    line-height: 1;
  }
  .nav-wordmark-bottom {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.78rem;
    letter-spacing: -0.01em;
    color: var(--text, #e8eaf0);
    line-height: 1;
  }
  .nav-home-link {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted, #7a8090);
    text-decoration: none;
    padding: 5px 12px;
    border: 1px solid var(--border, #2a2f3a);
    border-radius: 20px;
    transition: all 0.2s;
  }
  .nav-home-link:hover {
    color: var(--text, #e8eaf0);
    border-color: var(--muted, #7a8090);
  }

</style>
</head>
<body>
<div class="app">
<header>
  <a href="./index.html" style="display:flex;align-items:center;gap:12px;text-decoration:none"><img class="nav-logo-img" src="./AGSMlogo.jpeg" alt="Atkinson Graduate School of Management"><div class="nav-divider"></div><div class="nav-wordmark"><span class="nav-wordmark-top">TechReady Series</span><span class="nav-wordmark-bottom">Diagnostic Assessment</span></div></a>
  <div style="display:flex;align-items:center;gap:12px">
    <span id="headerRight" style="font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted)">TechReady Series</span>
    <div style="font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:0.1em;padding:4px 11px;border-radius:5px;background:var(--accent2);color:#000;font-weight:700">PRE</div>
    <a class="nav-home-link" href="./index.html">← Home</a>
  </div>
</header>
<div class="main" id="mainArea">
  <!-- Intro injected by JS -->
</div>
</div>

<script>
// ─── QUESTION BANK ──────────────────────────────────────────────────────────
// 5 questions per domain × 4 domains = 20 total
const domains = [
  { id: 'hw', label: 'Hardware vs. Software', icon: '🖥️', color: '#f0c040', cls: 'hw', module: 'Module 1' },
  { id: 'os', label: 'Operating Systems',     icon: '⚙️', color: '#30d8c8', cls: 'os', module: 'Module 2' },
  { id: 'fi', label: 'Files & Folders',       icon: '📁', color: '#f04880', cls: 'files', module: 'Module 3' },
  { id: 'net',label: 'Internet & Cloud',      icon: '🌐', color: '#c080ff', cls: 'net',  module: 'Module 4' },
];

const questions = [
  // Hardware (0-4)
  { domain:'hw', q:"Which of these is a hardware component?", a:["Microsoft Word","The CPU inside your laptop","Windows 11","A PDF file"], c:1, e:"The CPU is a physical chip you can touch — hardware. Word, Windows, and PDF files are all software or data." },
  { domain:'hw', q:"RAM is best described as:", a:["Permanent file storage","Short-term working memory for running programs","A type of processor","A network card"], c:1, e:"RAM holds programs and data only while actively in use. It clears when the computer powers off. Your files are stored on the hard drive, which is permanent." },
  { domain:'hw', q:"A program crashes but the rest of the computer works fine. This is:", a:["A hardware failure","A software problem with that application","A RAM hardware failure","A hard drive failure"], c:1, e:"When only one app crashes while everything else runs normally, it's a software issue with that specific program — not a hardware failure." },
  { domain:'hw', q:"A 'driver' is:", a:["A hardware chip on the motherboard","Software that lets the OS communicate with hardware","A type of external hard drive","The person who repairs computers"], c:1, e:"Drivers are small software programs that translate between the operating system and hardware devices like printers or graphics cards." },
  { domain:'hw', q:"Your GPU (Graphics Processing Unit) is most relevant for:", a:["Storing files permanently","Rendering visuals and accelerating AI/ML computation","Connecting to the internet","Managing user accounts"], c:1, e:"The GPU renders all visuals and is increasingly important for AI/ML workloads. Many local AI models use GPU acceleration for fast inference — making GPU specs critical for AI tasks." },

  // OS (5-9)
  { domain:'os', q:"What is the primary purpose of an operating system?", a:["To browse the internet","To manage all hardware, software, and system resources","To create documents","To protect against viruses only"], c:1, e:"The OS manages everything — hardware, memory, files, running programs, security, and the user interface. All other programs run on top of it." },
  { domain:'os', q:"A MacBook runs which operating system?", a:["Windows 11","Linux","macOS","Android"], c:2, e:"MacBooks exclusively run macOS, Apple's operating system. It cannot run Windows natively. The Apple logo at startup is the identifier." },
  { domain:'os', q:"On Windows, you find your OS version in:", a:["Microsoft Word → Help","Settings → System → About","The browser address bar","File Explorer → Desktop"], c:1, e:"Go to Settings (Win+I) → System → About. You'll see Edition (e.g., Windows 11 Pro) and Version. You can also press Win+R, type 'winver', press Enter." },
  { domain:'os', q:"OS 'End of Life' means:", a:["The computer's hardware is broken","No more security updates will be released for that OS","The computer will stop working immediately","You need new software licenses"], c:1, e:"End of Life means the vendor stops releasing security patches. Any new vulnerability will remain permanently unpatched, making the system a security risk." },
  { domain:'os', q:"When installing local AI software, the first compatibility check should be:", a:["Your email client version","Your OS version and whether it meets minimum requirements","Your browser version","Your antivirus brand"], c:1, e:"Local AI applications always list minimum OS version requirements (e.g., 'Windows 10 64-bit or later', 'macOS 12+', 'Ubuntu 20.04+'). Checking this first prevents wasted time on incompatible installs." },

  // Files (10-14)
  { domain:'fi', q:"What does the file path C:\\Users\\Ana\\Documents\\data.csv tell you?", a:["A website address","A CSV file named data in Ana's Documents folder on drive C:","An email attachment","A program installation path"], c:1, e:"Windows file paths use backslashes. This path means: C: drive → Users → Ana's account → Documents → the file data.csv. CSV is a common data format for AI training datasets." },
  { domain:'fi', q:"A .csv file is:", a:["A compressed archive","A comma-separated values file used for data tables","A video file","A system driver file"], c:1, e:".csv (Comma-Separated Values) is a plain text format for tabular data. It's the most common format for feeding data into AI models, spreadsheets, and data analysis tools." },
  { domain:'fi', q:"You accidentally delete a file on Windows. The best first step is:", a:["Call IT immediately","Check the Recycle Bin and restore from there","Buy data recovery software","Restart the computer"], c:1, e:"Deleted files go to the Recycle Bin first. Right-click the Recycle Bin → Open → find your file → right-click → Restore. Only after emptying the bin is the file actually gone." },
  { domain:'fi', q:"Which file naming convention is best for work documents?", a:["My Document (copy).docx","2024-03-15_ClientData_v2.csv","doc1.txt","final_FINAL_use_this.docx"], c:1, e:"Good names include a YYYY-MM-DD date (sorts correctly), specific description, and version number. This is especially important for AI datasets and training files that go through multiple iterations." },
  { domain:'fi', q:"The difference between saving to your local hard drive vs. cloud storage is:", a:["There is no difference","Local files are on your computer; cloud files are on remote servers accessible via internet","Cloud is only for images","Local storage is always faster for everything"], c:1, e:"Local storage is on your physical drive — fast, works offline, but only on that machine. Cloud storage (Google Drive, OneDrive) is on remote servers — accessible from anywhere with internet, synced across devices, shareable." },

  // Network/Cloud (15-19)
  { domain:'net', q:"HTTPS in a web address means:", a:["The site is very fast","The connection is encrypted and secure","The site requires a subscription","It's an older protocol"], c:1, e:"HTTPS (HTTP Secure) means your connection is encrypted using SSL/TLS. Always verify HTTPS and the correct domain before entering passwords or sensitive data." },
  { domain:'net', q:"'The cloud' means files are stored:", a:["In a physical cabinet at your office","On remote servers accessible via the internet","Only on your phone","On a USB drive"], c:1, e:"Cloud files live on remote servers owned by companies like Google, Microsoft, or Amazon. You access them over the internet from any device. AI APIs and models are typically cloud-hosted services." },
  { domain:'net', q:"A VPN is used to:", a:["Speed up all internet activity","Create an encrypted connection to a remote network (e.g., your company's)","Block all ads","Replace your Wi-Fi connection"], c:1, e:"A VPN creates an encrypted tunnel to a remote network, giving you secure access to company resources from anywhere. Required for accessing internal tools remotely and for secure work on public Wi-Fi." },
  { domain:'net', q:"An API (Application Programming Interface) allows:", a:["Two computers to share a physical cable","Software applications to communicate with each other programmatically","You to reset your Wi-Fi password","Your browser to load pages faster"], c:1, e:"APIs define how software components communicate. When you use an AI tool that 'calls an AI model,' it's making an API request. Understanding APIs is foundational for AI integration workflows." },
  { domain:'net', q:"You're working from a café and need to access company AI tools. The first security step is:", a:["Only use Chrome browser","Connect to your company's VPN before accessing any work systems","Switch to your phone's data connection only if it's 5G","Close all other browser tabs"], c:1, e:"Public Wi-Fi is unencrypted. Always connect to your company VPN before accessing work systems, AI tools, or any sensitive data on public networks. The VPN encrypts your traffic." },
];

// ─── STATE ──────────────────────────────────────────────────────────────────
let state = {
  screen: 'intro',
  currentQ: 0,
  order: [], // shuffled question indices
  results: {}, // domain -> {correct, total}
  answers: [], // {qIdx, correct} per question
  answered: false,
};

// Build question order: 5 per domain, randomized within domains but domain order fixed
function buildOrder() {
  const order = [];
  domains.forEach((d, di) => {
    const qs = questions.map((q,i)=>i).filter(i => questions[i].domain === d.id);
    // shuffle within domain
    for (let i = qs.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [qs[i],qs[j]]=[qs[j],qs[i]]; }
    order.push(...qs);
  });
  return order;
}

function domainProgress() {
  // returns {done, active, total} per domain
  const out = {};
  domains.forEach(d => { out[d.id] = {correct:0, total:0}; });
  state.answers.forEach(a => {
    const q = questions[state.order[a.qIdx]];
    out[q.domain].total++;
    if (a.correct) out[q.domain].correct++;
  });
  return out;
}

// ─── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  const main = document.getElementById('mainArea');
  const hr = document.getElementById('headerRight');
  if (state.screen === 'intro') { main.innerHTML = renderIntro(); attachIntro(); return; }
  if (state.screen === 'quiz')  { main.innerHTML = renderQuizScreen(); attachQuiz(); hr.textContent = `Q ${state.currentQ+1} / ${state.order.length}`; return; }
  if (state.screen === 'results') { main.innerHTML = renderResults(); attachResults(); hr.textContent = 'Assessment Complete'; return; }
}

function renderIntro() {
  return `
  <div class="intro-screen fade-up">
    <div class="intro-eyebrow">TechReady Series — Entry Point</div>
    <h1>Diagnostic<br><em>Pre-Assessment</em></h1>
    <p class="intro-desc">Before diving into the TechReady modules or AI coursework, take this 20-question diagnostic. It identifies exactly which topics you already know and where you have gaps — so you spend time only where you need it.</p>
    <div class="intro-cards">
      <div class="intro-card">
        <div class="intro-card-icon">⚡</div>
        <div class="intro-card-title">Takes ~10 minutes</div>
        <div class="intro-card-text">5 questions each across Hardware, Operating Systems, Files & Folders, and Internet & Cloud.</div>
      </div>
      <div class="intro-card">
        <div class="intro-card-icon">🎯</div>
        <div class="intro-card-title">Get a personalized plan</div>
        <div class="intro-card-text">Your results show which modules to complete in full, skim, or skip entirely before starting AI work.</div>
      </div>
      <div class="intro-card">
        <div class="intro-card-icon">🤖</div>
        <div class="intro-card-title">AI-focused framing</div>
        <div class="intro-card-text">Questions are framed around AI workflows — file formats, GPU specs, APIs, and cloud tools you'll actually use.</div>
      </div>
      <div class="intro-card">
        <div class="intro-card-icon">📊</div>
        <div class="intro-card-title">Domain-level feedback</div>
        <div class="intro-card-text">See your score per topic with a clear verdict: complete the module, review it, or proceed with confidence.</div>
      </div>
    </div>
    <button class="start-btn" id="startBtn">Begin Assessment →</button>
  </div>`;
}

function currentDomain() {
  const qIdx = state.order[state.currentQ];
  const q = questions[qIdx];
  return domains.find(d => d.id === q.domain);
}

function renderQuizScreen() {
  const qIdx = state.order[state.currentQ];
  const q = questions[qIdx];
  const dom = domains.find(d => d.id === q.domain);
  const prog = domainProgress();

  // Build dot indicators
  const dots = state.order.map((qi, i) => {
    let cls = 'progress-dot';
    if (i < state.currentQ) {
      const a = state.answers[i];
      cls += a ? (a.correct ? ' done' : ' gap') : ' done';
    } else if (i === state.currentQ) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');

  return `
  <div class="fade-up">
    <div class="domain-banner ${dom.cls}">
      <span class="domain-icon">${dom.icon}</span>
      <span>${dom.label}</span>
    </div>
    <div class="progress-header">
      <div>
        <div class="progress-domain" style="color:${dom.color}">${dom.label}</div>
        <div class="progress-dots">${dots}</div>
      </div>
      <div class="progress-counter">Q${state.currentQ+1} / ${state.order.length}</div>
    </div>
    <div class="q-card">
      <div class="q-text">${q.q}</div>
      <div class="answers" id="answersGrid">
        ${q.a.map((a,i)=>`<button class="ans-btn" data-i="${i}">${a}</button>`).join('')}
      </div>
      <div class="feedback" id="fb"></div>
      <button class="next-btn" id="nb">${state.currentQ < state.order.length-1 ? 'Continue →' : 'See My Results →'}</button>
    </div>
  </div>`;
}

function renderResults() {
  const prog = domainProgress();
  const totalCorrect = Object.values(prog).reduce((s,d)=>s+d.correct,0);
  const totalQ = state.order.length;
  const pct = Math.round(totalCorrect/totalQ*100);

  const domainRows = domains.map(d => {
    const p = prog[d.id];
    const dpct = p.total > 0 ? Math.round(p.correct/p.total*100) : 0;
    let verdict, vcls;
    if (dpct >= 80) { verdict = 'STRONG'; vcls = 'verdict-strong'; }
    else if (dpct >= 60) { verdict = 'REVIEW'; vcls = 'verdict-review'; }
    else { verdict = 'COMPLETE MODULE'; vcls = 'verdict-gap'; }
    const barColor = dpct >= 80 ? 'var(--correct)' : dpct >= 60 ? 'var(--warn)' : 'var(--gap)';
    return `
    <div class="domain-result">
      <div class="domain-result-icon">${d.icon}</div>
      <div class="domain-result-info">
        <div class="domain-result-name">${d.label} <span style="font-size:0.78rem;color:var(--muted);font-weight:400">(${d.module})</span></div>
        <div class="domain-result-bar"><div class="domain-result-fill" style="width:${dpct}%;background:${barColor}"></div></div>
        <div class="domain-result-score">${p.correct}/${p.total} correct — ${dpct}%</div>
      </div>
      <div class="domain-result-verdict ${vcls}">${verdict}</div>
    </div>`;
  }).join('');

  const recs = domains.map(d => {
    const p = prog[d.id];
    const dpct = p.total > 0 ? Math.round(p.correct/p.total*100) : 0;
    if (dpct >= 80) return `<div class="rec-item"><span class="rec-priority rec-skip">SKIP</span><div class="rec-text"><strong>${d.label}:</strong> You demonstrated solid knowledge here. You can proceed to AI coursework without completing ${d.module}, though a quick skim of the AI-specific sections is still worthwhile.</div></div>`;
    if (dpct >= 60) return `<div class="rec-item"><span class="rec-priority rec-review">REVIEW</span><div class="rec-text"><strong>${d.label}:</strong> You have a foundation but some gaps. Complete the interactive sections and AI-specific content in ${d.module} — focus especially on areas where you answered incorrectly.</div></div>`;
    return `<div class="rec-item"><span class="rec-priority rec-required">REQUIRED</span><div class="rec-text"><strong>${d.label}:</strong> You have significant gaps in this area. Complete ${d.module} in full before starting AI coursework — the concepts here directly underpin the AI tools you'll use.</div></div>`;
  }).join('');

  const headline = pct >= 80 ? '🏆 Strong Foundation' : pct >= 60 ? '📚 Some Gaps to Fill' : '🎯 Full Curriculum Recommended';
  const subtext = pct >= 80 ? 'You have solid tech fundamentals. Review the recommendations below and proceed to AI coursework with confidence.' : pct >= 60 ? 'You have some foundational knowledge but gaps in key areas. Complete the recommended modules before starting AI work.' : 'Your results show meaningful gaps across multiple areas. Working through the full TechReady series will set you up for success in AI coursework.';

  return `
  <div class="results-screen fade-up">
    <h2>${headline}</h2>
    <p class="results-sub">${subtext}<br>You answered <strong style="color:var(--text)">${totalCorrect} of ${totalQ}</strong> questions correctly (${pct}%). Your domain breakdown is below.</p>

    <div class="overall-bar">
      <div class="overall-ring">${pct}%</div>
      <div>
        <div class="overall-text-title">Overall Score: ${totalCorrect}/${totalQ}</div>
        <div class="overall-text-sub">Scored across Hardware, OS, Files & Folders, and Internet & Cloud — the four foundations of AI-ready tech literacy.</div>
      </div>
    </div>

    <div class="domain-results">${domainRows}</div>

    <div class="recs-title">📋 Your personalized learning path</div>
    <div class="recs-list">${recs}</div>

    <div class="results-actions">
      <button class="btn-primary" id="retakeBtn">Retake Assessment</button>
      <button class="btn-ghost" onclick="window.print()">Print Results</button>
    </div>
  </div>`;
}

// ─── EVENT HANDLERS ──────────────────────────────────────────────────────────
function attachIntro() {
  document.getElementById('startBtn').addEventListener('click', () => {
    state.order = buildOrder();
    state.currentQ = 0;
    state.answers = [];
    state.results = {};
    state.answered = false;
    state.screen = 'quiz';
    render();
  });
}

function attachQuiz() {
  state.answered = false;
  document.querySelectorAll('.ans-btn').forEach(b => {
    b.addEventListener('click', () => handleAnswer(parseInt(b.dataset.i)));
  });
  document.getElementById('nb').addEventListener('click', nextQuestion);
}

function handleAnswer(i) {
  if (state.answered) return;
  state.answered = true;
  const qIdx = state.order[state.currentQ];
  const q = questions[qIdx];
  const correct = i === q.c;
  state.answers.push({ qIdx: state.currentQ, correct });

  document.querySelectorAll('.ans-btn').forEach((b, idx) => {
    b.disabled = true;
    if (idx === q.c) b.classList.add('correct');
    if (idx === i && !correct) b.classList.add('wrong');
  });
  const fb = document.getElementById('fb');
  fb.className = 'feedback ' + (correct ? 'correct' : 'wrong');
  fb.innerHTML = (correct ? '✓ Correct! ' : '✗ Not quite. ') + q.e;
  document.getElementById('nb').classList.add('show');
}

function nextQuestion() {
  if (state.currentQ < state.order.length - 1) {
    state.currentQ++;
    state.answered = false;
    state.screen = 'quiz';
    render();
  } else {
    state.screen = 'results';
    render();
  }
}

function attachResults() {
  document.getElementById('retakeBtn').addEventListener('click', () => {
    state.screen = 'intro';
    render();
  });
  // Animate bars
  setTimeout(() => {
    document.querySelectorAll('.domain-result-fill').forEach(el => {
      const w = el.style.width;
      el.style.width = '0%';
      setTimeout(() => { el.style.width = w; }, 50);
    });
  }, 100);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
